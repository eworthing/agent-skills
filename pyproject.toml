# pyproject.toml
[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
  "E",    # pycodestyle errors
  "F",    # pyflakes
  "I",    # import sorting
  "UP",   # pyupgrade
  "B",    # flake8-bugbear
  "SIM",  # flake8-simplify
  "RUF",  # Ruff-specific correctness/cleanup rules
  "PTH",  # flake8-use-pathlib (already adopted in codebase)
  "YTT",  # flake8-2020 (sys.version correctness)
]
ignore = [
  "E501",   # formatter does best-effort line wrapping; avoid noisy conflicts
]

fixable = ["ALL"]
unfixable = []

[tool.ruff.format]
docstring-code-format = true
