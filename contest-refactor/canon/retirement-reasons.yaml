# Canonical retirement reasons. Used in two contexts:
#   1. findings_registry.json occurrences[].retirement.reason (when status == unresolvable)
#   2. halt_handoff.remaining_serious_findings_disposition[].disposition (G30)
# Cross-references: references/method.md Step 1.6, references/validation.md G30.
retirement_reasons:
  - unresolvable        # materially-same finding deemed retired via Branch A (3-way hash) or Branch B (2-way hash + intervening resolved); see method.md Step 1.6
  - user_decision       # blocked pending owner/product decision; ADR ref required (user_decision_ref sidecar field)
  - outside_scope       # current scope_label does not cover the finding (scope_label sidecar)
  - unverifiable        # tools available cannot validate the finding's claim (reason sidecar)
  - superseded          # replaced by a newer finding with clearer Source and Remedy (superseded_by sidecar)
