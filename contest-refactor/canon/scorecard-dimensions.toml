# Canonical scorecard dimension entries. Nine dimensions; each documented in architecture-rubric.md.
#
# Two-field shape:
#   id            machine identifier; used as the JSON key in CURRENT_REVIEW.json.scorecard.{id}.
#                 validate-artifact.py rejects scorecard objects with unknown keys.
#   display_label human-readable label that appears as the H3 heading in
#                 architecture-rubric.md § Score Anchors. validate-repo.py asserts
#                 every display_label appears verbatim in architecture-rubric.md.
#
# Cross-references: references/architecture-rubric.md § Score Anchors,
# references/output-format-json.md § Scorecard.

[[scorecard_dimensions]]
id = "architecture_quality"
display_label = "Architecture quality"

