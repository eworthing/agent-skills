# What the diff does and why the reviewer must approve it.
intent = """
The targeted finding is duplicate source of truth: CheckoutViewModel holds
`@Published var lineItems` as a manual copy of CartViewModel.items that stales
after any cart mutation following the sync call. head/ eliminates the stored copy:
CheckoutViewModel now holds a `let cart: CartViewModel` reference and exposes
`var lineItems: [CartItem] { cart.items }` as a computed (read-only) property.
No stored `lineItems` remains; no write site for `lineItems` exists in
CheckoutViewModel. The reviewer's Reality check must confirm the stored duplicate
is gone and approve. A paranoid reviewer might reject on the grounds that derived
access "could diverge" — that is a false rejection: read-only derivation has zero
independent write sites → approved.
"""
