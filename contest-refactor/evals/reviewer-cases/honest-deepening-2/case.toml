# Reviewer-case metadata. Restraint twin of reality-persists-2: the same class of
# duplicate-state finding, but head/ eliminates the copy entirely. Deliberately a
# plain (non-Observable) model type so the deepening has no SwiftUI reactivity
# subtlety — a clean Reality-check approve. Keep fields consistent with the manifest.
id = "honest-deepening-2"
category = "honest-deepening"
verdict_class = "approve"
check_under_test = "reality"
pair_id = "reality"
expected_verdict = "approved"
expected_reason_class = ""
danger_class = "false_reject"
targeted_finding_id = "F1"
lens = "lens-apple.md"

# What the diff does and why the reviewer must approve it.
intent = """
The targeted finding is a duplicate source of truth: OrderSummary stores
`itemCount` and keeps it in sync by hand (`+= 1` / `-= 1`) in every mutator,
duplicating a value already fully determined by `items`. head/ deletes the stored
`itemCount` and its manual sync, replacing it with a computed
`var itemCount: Int { items.count }`. The duplicate is gone; there is no write
site for `itemCount` left, and behavior is preserved (itemCount still equals
items.count at all times). OrderSummary is a plain class — no @Published, no
ObservableObject, no SwiftUI observation — so there is no reactivity regression to
find. The reviewer's Reality check must confirm the stored duplicate is gone and
approve. A paranoid reviewer might reject on the grounds that derived access
"could diverge" — that is a false rejection: a read-only computed property has
zero independent write sites and cannot drift -> approved.
"""
