<!DOCTYPE html>
<!--
  contest-refactor self-contained HTML report skeleton.

  Substitution model (shadowX4fox@ed5118f): scripts/render_report.py replaces every
  {{TOKEN}} below with escaped content. The report is fully OFFLINE — all CSS is inline
  and trend sparklines are hand-rolled inline <svg> (no d3, no external <script src>, no
  CDN). It must render with no network.

  Tokens (all required, substituted in one pass):
    {{TITLE}}            report title
    {{SUBTITLE}}         state · loop N/cap · verdict
    {{VERDICT_EXPLAIN}}  one-line verdict explanation
    {{SCORECARD_ROWS}}   generated <tr> rows: dimension, score, delta, trend sparkline, residual
    {{STRENGTHS}}        generated <li> items (or an empty-state note)
    {{FINDINGS}}         generated finding blocks (or an empty-state note)
    {{GENERATED}}        generation timestamp
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}}</title>
<style>
  :root { --bg:#0f1115; --panel:#171a21; --ink:#e6e9ef; --muted:#9aa4b2; --line:#2a2f3a;
          --up:#3fb950; --down:#f85149; --same:#8b949e; --accent:#58a6ff; }
  * { box-sizing: border-box; }
  body { margin:0; padding:2rem; background:var(--bg); color:var(--ink);
         font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  h1 { font-size:1.4rem; margin:0 0 .25rem; }
  .subtitle { color:var(--muted); margin:0 0 .25rem; }
  .explain { color:var(--ink); margin:0 0 1.5rem; font-style:italic; }
  .panel { background:var(--panel); border:1px solid var(--line); border-radius:8px;
           padding:1rem 1.25rem; margin-bottom:1.5rem; }
  h2 { font-size:1rem; margin:0 0 .75rem; color:var(--accent); }
  table { width:100%; border-collapse:collapse; }
  th,td { text-align:left; padding:.45rem .5rem; border-bottom:1px solid var(--line); vertical-align:middle; }
  th { color:var(--muted); font-weight:600; }
  td.num { font-variant-numeric:tabular-nums; font-weight:600; }
  .delta-UP { color:var(--up); } .delta-DOWN { color:var(--down); } .delta-SAME { color:var(--same); }
  svg.spark { display:block; }
  svg.spark polyline { fill:none; stroke:var(--accent); stroke-width:1.5; }
  svg.spark circle { fill:var(--accent); }
  .residual { color:var(--muted); font-size:.9em; }
  ul { margin:.25rem 0; padding-left:1.25rem; }
  .finding { border-left:3px solid var(--down); padding:.25rem .75rem; margin:.5rem 0; }
  .finding .sev { color:var(--down); font-weight:600; }
  .empty { color:var(--muted); }
  footer { color:var(--muted); font-size:.85em; margin-top:1rem; }
</style>
</head>
<body>
  <header>
    <h1>{{TITLE}}</h1>
    <p class="subtitle">{{SUBTITLE}}</p>
    <p class="explain">{{VERDICT_EXPLAIN}}</p>
  </header>

  <section class="panel">
    <h2>Scorecard &amp; per-dimension trend</h2>
    <table>
      <thead>
        <tr><th>Dimension</th><th>Score</th><th>Δ</th><th>Trend</th><th>Residual</th></tr>
      </thead>
      <tbody>
        {{SCORECARD_ROWS}}
      </tbody>
    </table>
  </section>

  <section class="panel">
    <h2>Strengths</h2>
    <ul>{{STRENGTHS}}</ul>
  </section>

  <section class="panel">
    <h2>Findings</h2>
    {{FINDINGS}}
  </section>

  <footer>Generated by contest-refactor render_report.py · {{GENERATED}}</footer>
</body>
</html>
